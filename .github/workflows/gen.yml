name: gen

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
      - 'web/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
      - 'web/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  gen:
    name: tool_${{ matrix.tool }}
    runs-on: ubuntu-24.04

    env:
      RUSTFLAGS: -D warnings

    strategy:
      matrix:
        tool: [bindings, package, reactor, yml, license, workspace]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: Install rustfmt
        run: rustup component add rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.tool }}
      - name: Run
        run: cargo run -p tool_${{ matrix.tool }}
      - name: Check
        shell: bash
        run: |
          git add -N .
          git diff --exit-code || (echo '::error::Generated `tool_${{ matrix.tool }}` is out-of-date. Please run `cargo run -p tool_${{ matrix.tool }}`'; exit 1)
