name: gen

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  gen:
    name: tool_${{ matrix.tool }}
    runs-on: windows-2025-vs2026

    env:
      RUSTFLAGS: -D warnings

    strategy:
      fail-fast: false
      matrix:
        tool: [bindings, package, reactor, webview, yml, license, workspace, features]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Configure Windows SDK include paths
        if: matrix.tool == 'webview'
        uses: ./.github/actions/fix-environment
        with:
          update-packages: false
      - name: Install LLVM and Clang
        if: matrix.tool == 'webview'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set LIBCLANG_PATH
        if: matrix.tool == 'webview'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/bin" >> "$GITHUB_ENV"
        shell: bash
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.tool }}
      - name: Run
        run: cargo run -p tool_${{ matrix.tool }}
      - name: Check
        shell: bash
        run: |
          git add -N .
          git diff --exit-code || (echo '::error::Generated `tool_${{ matrix.tool }}` is out-of-date. Please run `cargo run -p tool_${{ matrix.tool }}`'; exit 1)
