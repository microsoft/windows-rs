name: msrv-windows

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  msrv-windows:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v7
# generated - run `cargo run -p tool_yml` to update
      - name: Rust version
        run: rustup update --no-self-update 1.85 && rustup default 1.85
      - uses: Swatinem/rust-cache@v2
      - name: Check windows
        run:  cargo check -p windows --all-features
