name: docs

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  windows:
    name: windows
    runs-on: windows-2025-vs2026
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check
        run: cargo doc --no-deps -p windows

  windows-sys:
    name: windows-sys
    runs-on: windows-2025-vs2026
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check
        run: cargo doc --no-deps -p windows-sys

  other-crates:
    name: other-crates
    runs-on: windows-2025-vs2026
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check
        run: >
          cargo doc --no-deps
          -p windows-bindgen
          -p windows-core
          -p cppwinrt
          -p windows-implement
          -p windows-interface
          -p windows-registry
          -p windows-result
          -p windows-strings
          -p windows-targets
          -p windows-version

  linux:
    name: linux
    # The publishable-docs surface for fully cross-platform crates must keep
    # building on a non-Windows target. The list is intentionally narrower
    # than `--workspace`.
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: -D warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> "$GITHUB_ENV"
      - name: Doc
        run: |
          set -euxo pipefail
          for crate in \
              windows-numerics \
              windows-link \
              windows-targets \
              windows-interface \
              windows-implement \
              windows-result \
              windows-core \
              windows-strings \
              windows-threading \
              windows-future \
              windows-collections \
              windows-reference \
              windows-metadata \
              windows-rdl \
              windows-bindgen \
              riddle ; do
            cargo doc --no-deps --target x86_64-unknown-linux-gnu -p "$crate"
          done
      - name: Check diff
        shell: bash
        run: |
          git add -N .
          git diff --exit-code || (echo 'Doc build changed code in the repo.'; exit 1)
