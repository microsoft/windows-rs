name: docs

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  windows:
    name: windows
    runs-on: windows-2025-vs2026
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo doc --no-deps -p windows

  other:
    name: other
    runs-on: windows-2025-vs2026
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
# generated - run `cargo run -p tool_yml` to update
      - name: Check
        run: cargo doc --no-deps -p cppwinrt -p riddle -p windows-animation -p windows-bindgen -p windows-canvas -p windows-collections -p windows-core -p windows-future -p windows-implement -p windows-interface -p windows-metadata -p windows-numerics -p windows-rdl -p windows-reactor -p windows-reference -p windows-registry -p windows-result -p windows-services -p windows-strings -p windows-sys -p windows-targets -p windows-threading -p windows-time -p windows-version -p windows-webview -p windows-window
