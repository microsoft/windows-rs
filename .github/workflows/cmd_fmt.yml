name: cmd_fmt

permissions:
  contents: write

on:
  issue_comment:
    types: [created]

jobs:
  fmt:
    if: github.event.issue.pull_request != '' && github.event.comment.body == '/fmt'
    runs-on: ubuntu-latest
    steps:
      - name: React with eyes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions --method POST -f content='eyes'
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Get PR head branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all
      - name: Commit and push changes
        run: |
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git checkout -b ${{ steps.pr.outputs.branch }}
          git add -A
          git diff --cached --quiet || git commit -m "cargo fmt"
          git push origin ${{ steps.pr.outputs.branch }}
      - name: React with thumbs up
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions --method POST -f content='+1'
