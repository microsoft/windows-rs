name: web

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get sources
        uses: actions/checkout@v7

      - name: Setup mdBook
        run: |
          cargo install mdbook

      - name: Build
        working-directory: web
        run: |
          mkdir -p .build/book

          # Copy static files
          cp -r static/* .build/

          # Build book
          pushd book
          mdbook build --dest-dir ../.build/book
          popd

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./web/.build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
