name: rdl-no-libclang

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: rdl without libclang (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]

    env:
      RUSTFLAGS: -D warnings

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable

      # Deliberately do NOT install LLVM or set LIBCLANG_PATH. Instead, remove
      # any libclang shared libraries that ship preinstalled on the runner so
      # that `clang_sys::load()` is guaranteed to fail. This proves that
      # `windows-rdl`'s reader/writer surface works without libclang on the
      # machine, and that `clang_version()` returns a clean error rather than
      # panicking when libclang is missing.
      - name: Remove libclang from runner (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          sudo apt-get remove --purge -y 'libclang-*-dev' 'libclang1-*' 'libclang-common-*-dev' 'clang-*' 'llvm-*' || true
          sudo apt-get autoremove -y || true
          # Defensively delete any stray libclang.so* left in standard locations.
          sudo find /usr/lib /usr/local/lib /usr/lib/x86_64-linux-gnu -maxdepth 4 \
            \( -name 'libclang.so*' -o -name 'libclang-*.so*' \) -print -delete || true
          # Sanity-check: there should be no libclang on the default loader path.
          if ldconfig -p | grep -i 'libclang'; then
            echo "libclang is still present on the runner; the test would not be meaningful."
            exit 1
          fi

      - name: Remove libclang from runner (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Make sure LIBCLANG_PATH is empty for the rest of the job, so
          # clang-sys's runtime loader can't pick it up that way.
          "LIBCLANG_PATH=" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $env:LIBCLANG_PATH = ''

          # Wipe LLVM install directories shipped on the windows-2022 image so
          # libclang.dll is unreachable through DLL search paths.
          foreach ($dir in @(
            'C:\Program Files\LLVM',
            'C:\Program Files (x86)\LLVM',
            'C:\hostedtoolcache\windows\llvm'
          )) {
            if (Test-Path $dir) {
              Write-Host "Removing $dir"
              Remove-Item -Recurse -Force $dir -ErrorAction SilentlyContinue
            }
          }

          # Iteratively delete every libclang.dll discoverable on PATH (this is
          # exactly the lookup `clang-sys` does at runtime). Loop until
          # `where.exe` reports nothing.
          for ($i = 0; $i -lt 20; $i++) {
            $found = & where.exe libclang.dll 2>$null
            if ($LASTEXITCODE -ne 0 -or -not $found) { break }
            foreach ($p in $found) {
              $p = $p.Trim()
              if ($p -and (Test-Path $p)) {
                Write-Host "Removing $p"
                Remove-Item -Force $p -ErrorAction SilentlyContinue
              }
            }
          }

          # Final sanity-check: no libclang.dll discoverable via PATH.
          $found = & where.exe libclang.dll 2>$null
          if ($LASTEXITCODE -eq 0 -and $found) {
            Write-Error "libclang.dll is still discoverable on PATH:`n$found"
            exit 1
          }

      - name: Build windows-rdl (no libclang on machine)
        run: cargo build -p windows-rdl

      - name: Test test_rdl (reader/writer surface, no libclang on machine)
        env:
          WINDOWS_RDL_NO_LIBCLANG: '1'
        run: cargo test -p test_rdl
