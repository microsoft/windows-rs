name: cmd_kick

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  issue_comment:
    types: [created]

jobs:
  kick:
    if: github.event.issue.pull_request != '' && github.event.comment.body == '/kick'
    runs-on: ubuntu-latest
    steps:
      - name: React with eyes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions --method POST -f content='eyes'
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Get PR head branch
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Push empty commit
        run: |
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}
          git checkout -b ${{ steps.pr.outputs.branch }}
          git commit --allow-empty -m "retrigger checks"
          git push origin ${{ steps.pr.outputs.branch }}
      - name: React with thumbs up
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions --method POST -f content='+1'
