name: linux

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/web.yml'
      - 'crates/libs/rdl/rdl.md'
      - 'web/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

# This workflow exercises the parts of the Linux build that the main Linux row
# of `test.yml` cannot. `test.yml` runs `cargo test --all` with the workspace's
# Windows-only crates gated out via `#![cfg(windows)]`, which covers the
# default-features build/test path. The remaining checks below have
# intentionally narrower crate sets — `--no-default-features` is the `no_std`
# surface, and `cargo doc` is the publishable-docs surface — so they keep
# explicit lists rather than `--workspace`.

jobs:
  linux:
    runs-on: ubuntu-22.04

    env:
      RUSTFLAGS: -D warnings

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Update toolchain
        run: rustup update --no-self-update stable && rustup default stable
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> "$GITHUB_ENV"
      - name: Install libtinfo5 (Linux)
        run: sudo apt-get install -y libtinfo5
      - name: Build cross-platform libraries on Linux (no default features)
        # Preserve the `no_std` / no-default-features path for crates that opt
        # into it. This guards against accidentally pulling `std` into a crate
        # that is meant to stay portable down to embedded targets.
        run: |
          set -euxo pipefail
          for crate in \
              windows-numerics \
              windows-link \
              windows-targets \
              windows-result \
              windows-core \
              windows-strings \
              windows-threading \
              windows-collections ; do
            cargo build --target x86_64-unknown-linux-gnu --no-default-features -p "$crate"
          done
      - name: Doc cross-platform libraries on Linux
        run: |
          set -euxo pipefail
          for crate in \
              windows-numerics \
              windows-link \
              windows-targets \
              windows-interface \
              windows-implement \
              windows-result \
              windows-core \
              windows-strings \
              windows-threading \
              windows-future \
              windows-collections \
              windows-metadata \
              windows-rdl \
              windows-bindgen \
              riddle ; do
            cargo doc --no-deps --target x86_64-unknown-linux-gnu -p "$crate"
          done
      - name: Check diff
        shell: bash
        run: |
          git add -N .
          git diff --exit-code || (echo 'Tests changed code in the repo.'; exit 1)
