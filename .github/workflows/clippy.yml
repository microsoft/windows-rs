name: clippy

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'crates/libs/rdl/rdl.md'
      - 'docs/**'
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  clippy:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Update toolchain
        run: rustup update --no-self-update nightly && rustup default nightly-x86_64-pc-windows-msvc
      - name: Add toolchain target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Install clippy
        run: rustup component add clippy
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Fix environment
        uses: ./.github/actions/fix-environment
        with:
          target: x86_64-pc-windows-msvc
      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/bin" >> "$GITHUB_ENV"
        shell: bash
      - uses: Swatinem/rust-cache@v2
      - name: Check
        # test_no_std is excluded because --all-targets feature-unification pulls std into its no_std graph (duplicate panic_impl)
        run:  cargo clippy --workspace --all-targets --exclude test_no_std --exclude tool_validate -- -D warnings
