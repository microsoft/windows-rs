# Headers parsed in their own satellite translation unit (see `Manifest::satellite_headers`).
# These device-driver families place their `DEFINE_GUID` blocks outside the include guards,
# so they collide under the main TU's definition mode; parsed in isolation with `INITGUID`
# held off they emit cleanly, and clang USR deduplicates their shared closure against the
# main TU so only the new device partitions are added.
satellite-headers = [
    "ntddstor.h",
    "ntddcdrm.h",
