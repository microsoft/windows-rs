# Import libraries (resolved against the `LIB` environment) read to recover the
# faithful function -> DLL mapping. Ordered first-wins, so position is precedence: the
# per-DLL host libraries come first (`kernel32.lib` -> `KERNEL32.dll`) so every classic
# export resolves to its real DLL, matching the classic Win32 desktop surface and
# today's `windows`/`windows-sys` bindings; the trailing `api-ms-win-*` umbrella
# libraries then fill the modern apiset-only residue no host library claims. A function
# no library here exports is emitted with an empty library rather than guessing — but
# with the umbrella tail that residue is limited to genuinely lib-less surface (inline
