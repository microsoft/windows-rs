# tool_win32 — orchestration manifest for an in-house Windows.Win32.winmd.
#
# The metadata is partitioned by each declaration's *defining header* (the clang
# cursor location), not by an editorial namespace taxonomy. There is deliberately
# NO type-level curation here — no per-symbol owners, no re-homing, no synthetic
# attributes. The only inputs are mechanical: which SDK headers to bring into scope,
# and the import libraries that record which DLL actually exports each function
# (the one piece of truth the headers do not carry). Everything about the *shape*
# of the API comes from the headers and SAL.
#
# Every declaration lands in the single flat `Windows.Win32` namespace; its defining
# header only determines which `.rdl` *file* it is written to (e.g. `wingdi.h` ->
# `wingdi.rdl`). Names are deduplicated globally by clang USR, so a type referenced
# across headers resolves to one canonical definition — a scalar like `HRESULT` stays
# `type HRESULT = i32` in its defining file and is referenced by bare name.

root = "Windows.Win32"

# Reachability scope: the SDK directories whose headers are *the Windows API*. A
# declaration defined under `um/` or `shared/` is emitted unconditionally; everything
# else the `#include <windows.h>` prelude transitively drags in — the C-runtime under
# `ucrt/` and the MSVC compiler toolset `include/` (`<string.h>`, `<vcruntime.h>`,
# `<stdlib.h>`, the `errno`/`INT_MAX` constants, ~456 cdecl CRT functions) — is emitted
# only when an in-scope declaration references it, and is otherwise dropped. This is
# reachability-by-reference, not an allowlist: the genuine cross-over types that real
# Win32 APIs reference (`size_t`, `va_list`, `EXCEPTION_DISPOSITION`) survive
# automatically, with no per-symbol curation. The same mechanism scopes a 3rd-party
# target (set `scope = ["wil"]` etc.) to its own headers while the platform resolves
# through a `--reference` winmd.
scope = ["um", "shared"]

# Architectures to scrape and arch-merge. The committed RDL corpus is always
# x64-canonical; any extra arch (`arm64`, `x86`) is scraped to a throwaway winmd and
# folded in via SupportedArchitecture. Empty/["x64"] = single-arch. Multi-arch is opt-in:
# set ["x64", "arm64", "x86"] for a full arch-tagged winmd build.
archs = ["x64", "arm64", "x86"]

# The API headers to bring into scope. Each is `#include`d behind a `#include
# <windows.h>` prelude so its prerequisites are satisfied. Every *defining header*
# reachable from these is emitted as its own partition, so the foundational headers
# they reference (handles, scalar typedefs, fundamental structs) come along
