[package]
name = "tool_header2rdl"
version = "0.0.0"
edition = "2021"
publish = false

# This tool requires libclang at runtime.
# On Ubuntu, set LIBCLANG_PATH=/usr/lib/llvm-20/lib (or whichever LLVM version
# is installed) before running `cargo run` or the tests.

[lib]
name = "tool_header2rdl"
path = "src/lib.rs"
doc = false
doctest = false

[[bin]]
name = "tool_header2rdl"
path = "src/main.rs"

[dependencies]
clang = { version = "2.0.0", features = ["runtime"] }
windows-rdl = { workspace = true }

[lints]
workspace = true
