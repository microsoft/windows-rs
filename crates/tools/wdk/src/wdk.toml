# tool_wdk — orchestration manifest for an in-house Windows.Wdk.winmd.
#
# The WDK scrape is the *additive* companion to `tool_win32`: it parses the kernel-mode WDK
# headers and emits only the surface the WDK adds on top of Win32, into the same flat
# `Windows.Win32` namespace. Every entity Win32 already defines is skipped (see
# `reference-winmds`) and resolved by bare name once both winmds are loaded together, so a
# WDK routine that takes an `NTSTATUS` or `IO_STATUS_BLOCK` just names it.
#
# Like `win32.toml` there is deliberately NO type-level curation here — no per-symbol owners,
# no re-homing. The only inputs are mechanical: which kernel headers to bring into scope, the
# reachability scope, the import libraries that record which DLL exports each function, and the
# Win32 winmd used as the exclusion + resolution reference. Everything about the *shape* of the
# API comes from the headers and SAL. Toolchain provisioning (the pinned WDK/SDK NuGet package
# versions and the per-arch preprocessor defines the kernel headers need) lives in `main.rs`.

root = "Windows.Win32"

# Reachability scope: the WDK kernel-mode headers live under `km`. A declaration defined there
# is emitted unconditionally; the SDK `um`/`shared`/`ucrt` closure the translation unit pulls in
# to compile is emitted only when a `km` declaration references it (and then dropped anyway if
# Win32 already defines it), so the CRT/toolset noise never reaches the corpus.
scope = ["km"]

# Architectures to scrape and arch-merge, mirroring `win32.toml`. x64 is always canonical; the
# extra arches are folded in via SupportedArchitecture so a kernel type present on only a subset
# of arches (`KUMS_CONTEXT_HEADER`, whose `PXMM_SAVE_AREA32` field is x64/arm64ec-only) is tagged
# instead of emitted arch-neutral and breaking the pure-arm64 build.
archs = ["x64", "arm64", "x86"]

# The WDK source headers, in include order. `ntifs.h` comes *before* `wdm.h`: it defines
# `_NTIFS_INCLUDED_` and the `PEPROCESS`/`PETHREAD` opaque typedefs first, so including it second
# would collide with `wdm.h`'s own forward declarations of the same names. `offreg.h` (the
# offline-registry API) has no includes of its own and relies on the `DWORD`/`PCWSTR`/`HANDLE`
# types the earlier headers bring in, so it is included last.
source-headers = ["ntifs.h", "wdm.h", "offreg.h"]

# The in-house Win32 winmd, used as the exclusion + resolution reference. Every entity it already
# defines (the shared closure — `NTSTATUS`, `IO_STATUS_BLOCK`, `GENERIC_READ`, …) is skipped
# rather than re-emitted here, so this winmd holds only the WDK-net-new surface, and those skipped
# references resolve against Win32 by bare name once both winmds are loaded together.
reference-winmds = ["crates/libs/bindgen/default/Windows.Win32.winmd"]

# Import libraries read to recover the faithful function → DLL mapping the headers do not carry:
# `ntdll.lib` (`NtReadFile`, `RtlGetVersion`, …) from the SDK and `offreg.lib` (`ORCreateHive`, …)
# from the WDK. Combined with lib-less dropping, a routine that resolves to no import library
# (kernel-only `ntoskrnl` exports) is dropped. Resolved against the SDK and WDK x64 lib trees.
import-libs = ["ntdll.lib", "offreg.lib"]
