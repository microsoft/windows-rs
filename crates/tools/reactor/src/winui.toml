# Reactor widget declarations — metadata-driven format.
#
# Section keys are full WinUI type names. Member keys are metadata
# property or event names. The tool resolves put_/add_ methods, value
# types, and interfaces from .winmd metadata automatically.
#
# ── Property overrides ──────────────────────────────────────────────
#   (no overrides)       Optional: field is Option<T>, emit when Some.
#   required = true      Always emit (field is T). For core state.
#   default = "expr"     Emit only when != expr (field is T). Auto-infers unset.
#   unset = "custom"     Hand-written unset handler (skip codegen).
#   unset = { default = "expr" }   Reset to literal on unset.
#   type = "Type"        Explicit PropValue variant (Str/F64/Bool/I32/etc).
#                        For Object (IInspectable) params, selects IReference<T>
#                        wrapping instead of the default TextBlock wrapping.
#
# ── Event overrides ─────────────────────────────────────────────────
#   (no overrides)       Auto-inferred: add_{Name}, invoke pattern, etc.
#   type = "Type"        EventHandler payload type (Unit/Bool/Str/F64/I32/Color/DateTime/TimeSpan).
#   manual = true        Skip codegen; hand-written attach_event in backend.
#   property = "Name"    Property on sender/args (e.g. "IsOn"); codegen calls get_Name.
#   false_event = "Name" Complement event for bool-dual (e.g. "Unchecked").

