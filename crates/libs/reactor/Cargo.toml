[package]
name = "windows-reactor"
version = "0.0.0"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
description = "Windows UI library"
repository = "https://github.com/microsoft/windows-rs"
categories = ["os::windows-apis"]
readme = "readme.md"

[features]
default = []
test = []
# Optional typed bridges to the sibling UI crates. Each pulls in its crate only
# when enabled, keeping the default reactor build lean. `composition` forces
# windows-composition into its `lifted` stack (the only stack reactor can host).
composition = ["dep:windows-composition", "windows-composition/lifted"]
canvas = ["dep:windows-canvas"]

[dependencies]
rustc-hash = { workspace = true }
windows-core = { workspace = true }
windows-numerics = { workspace = true }
windows-collections = { workspace = true, features = ["std"] }
windows-future = { workspace = true }
windows-reference = { workspace = true, features = ["std"] }
windows-threading = { workspace = true }
windows-time = { workspace = true }

[dependencies.windows-composition]
workspace = true
optional = true

[dependencies.windows-canvas]
workspace = true
optional = true

[lints]
workspace = true
