[package]
name = "windows-reactor"
version = "0.0.0"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
description = "Windows UI library"
repository = "https://github.com/microsoft/windows-rs"
categories = ["os::windows-apis"]
readme = "readme.md"

[features]
default = []
test = []
# Optional typed bridge to windows-canvas, pulled in only when enabled to keep
# the default reactor build lean. windows-composition is a required dependency
# (the transition/animation engine is composition-based), always in its `lifted`
# stack — the only stack reactor can host.
canvas = ["dep:windows-canvas"]

[dependencies]
rustc-hash = { workspace = true }
windows-core = { workspace = true }
windows-numerics = { workspace = true }
windows-collections = { workspace = true, features = ["std"] }
windows-future = { workspace = true }
windows-reference = { workspace = true, features = ["std"] }
windows-threading = { workspace = true }
windows-time = { workspace = true }
windows-composition = { workspace = true, default-features = false, features = ["lifted"] }

[dependencies.windows-canvas]
workspace = true
optional = true

[lints]
workspace = true
