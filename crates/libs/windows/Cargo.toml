
[package]
name = "windows"
version = "0.62.2"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
description = "Rust for Windows"
repository = "https://github.com/microsoft/windows-rs"
documentation = "https://microsoft.github.io/windows-docs-rs/"
categories = ["os::windows-apis"]
readme = "readme.md"

[dependencies]
windows-collections = { workspace = true }
windows-core = { workspace = true }
windows-future = { workspace = true }
windows-numerics = { workspace = true }
windows-reference = { workspace = true }
windows-time = { workspace = true }

[lib]
test = false
doctest = false

[lints]
workspace = true

[package.metadata.docs.rs]
default-target = "x86_64-pc-windows-msvc"
targets = []
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["std", "windows-core/proc-macros"]
docs = []
std = ["windows-collections/std", "windows-core/std", "windows-future/std", "windows-numerics/std", "windows-reference/std", "windows-time/std"]
