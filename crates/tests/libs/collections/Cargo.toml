[package]
name = "test_collections"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
doc = false
doctest = false

# Tests that exercise WinRT activation (`Calendar`, `StringMap`) need the
# `windows` mega-crate and therefore only build on Windows. The portable stock
# collection tests use `windows-core` / `windows-strings` / `windows-collections`
# directly.
[target.'cfg(windows)'.dependencies.windows]
workspace = true
features = [
    "Foundation_Collections",
    "Globalization",
    "Win32_Foundation",
]

[dependencies.windows-core]
workspace = true

[dependencies.windows-strings]
workspace = true

[dependencies.windows-collections]
workspace = true
features = ["std"]

[lints]
workspace = true
