[package]
name = "lang_perf_component"
version = "0.0.0"
edition = "2024"
publish = false

[lib]
name = "langperf_rust"
crate-type = ["cdylib"]

[dependencies]
windows = { workspace = true, features = ["Win32_System_WinRT"] }
windows-core = { workspace = true, default-features = true }
windows-collections = { workspace = true, features = ["std"] }
windows-future = { workspace = true, features = ["std"] }

[build-dependencies]
windows-rdl = { workspace = true }
windows-bindgen = { workspace = true }

[lints]
workspace = true
